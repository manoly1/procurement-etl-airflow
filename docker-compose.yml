# Local infrastructure.
#   postgres     — the data warehouse (raw/staging/marts/meta) — Stage 2
#   airflow-*    — scheduler + webserver (LocalExecutor) — Stage 3
#   MinIO / Metabase are added in their stages.

# Shared Airflow config (image, env, mounts) reused by every airflow-* service.
x-airflow-common: &airflow-common
  image: apache/airflow:2.10.4
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db:5432/airflow
    # The pipeline's own connection + import path (repo is mounted at /opt/project).
    DATABASE_URL: postgresql+psycopg2://etl:etl@postgres:5432/procurement
    PROJECT_ROOT: /opt/project
    PYTHONPATH: /opt/project
    RAW_DIR: /opt/project/data/raw
    # Dev convenience: install the pipeline's extra deps into the image on start.
    # (SQLAlchemy / psycopg2 come with Airflow — do not re-pin them here.)
    _PIP_ADDITIONAL_REQUIREMENTS: "pandas openpyxl pyyaml faker pyarrow typer"
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./:/opt/project
  depends_on:
    airflow-db:
      condition: service_healthy

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: etl
      POSTGRES_PASSWORD: etl
      POSTGRES_DB: procurement
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # DDL in sql/init/ runs automatically on first start (schemas + tables).
      - ./sql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U etl -d procurement"]
      interval: 5s
      timeout: 5s
      retries: 10

  airflow-db:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot: migrate the metadata DB and create the admin user.
  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - >
        airflow db migrate &&
        airflow users create --username admin --password admin
        --firstname Admin --lastname User --role Admin --email admin@example.com

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      airflow-db:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 15s
      timeout: 10s
      retries: 10

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      airflow-db:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

volumes:
  pgdata:
  airflow_db:
