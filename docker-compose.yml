# Local infrastructure. Postgres is here from Stage 2; Airflow, MinIO and
# Metabase services are added in their respective stages.
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: etl
      POSTGRES_PASSWORD: etl
      POSTGRES_DB: procurement
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # DDL in sql/init/ runs automatically on first start (schemas + tables).
      - ./sql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U etl -d procurement"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
