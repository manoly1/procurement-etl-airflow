# Local infrastructure.
#   postgres     — the data warehouse (raw/staging/marts/meta) — Stage 2
#   airflow-*    — scheduler + webserver (LocalExecutor) — Stage 3
#   minio        — S3-compatible object store for the raw layer — Stage 6
#   metabase     — BI dashboards over the dbt marts — Stage 7

# Shared Airflow config (image, env, mounts) reused by every airflow-* service.
x-airflow-common: &airflow-common
  image: apache/airflow:2.10.4
  environment: &airflow-env
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-db:5432/airflow
    # The pipeline's own connection + import path (repo is mounted at /opt/project).
    DATABASE_URL: postgresql+psycopg2://etl:etl@postgres:5432/procurement
    PROJECT_ROOT: /opt/project
    PYTHONPATH: /opt/project
    RAW_DIR: /opt/project/data/raw
    # Object store (MinIO) — the DAG lands raw extracts into the lake via boto3.
    MINIO_ENDPOINT: http://minio:9000
    MINIO_ACCESS_KEY: minioadmin
    MINIO_SECRET_KEY: minioadmin
    MINIO_BUCKET: procurement-raw
    # Dev convenience: install the pipeline's extra deps into the image on start.
    # (SQLAlchemy / psycopg2 come with Airflow — do not re-pin them here.)
    _PIP_ADDITIONAL_REQUIREMENTS: "pandas openpyxl pyyaml faker pyarrow typer boto3"
  volumes:
    - ./dags:/opt/airflow/dags
    - ./logs:/opt/airflow/logs
    - ./:/opt/project
  depends_on:
    airflow-db:
      condition: service_healthy

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: etl
      POSTGRES_PASSWORD: etl
      POSTGRES_DB: procurement
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # DDL in sql/init/ runs automatically on first start (schemas + tables).
      - ./sql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U etl -d procurement"]
      interval: 5s
      timeout: 5s
      retries: 10

  # S3-compatible object store: the raw xlsx extracts land here (the local
  # stand-in for a cloud data lake). Console at http://localhost:9001.
  minio:
    image: minio/minio:RELEASE.2024-10-13T13-34-11Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot: create the raw bucket so the first ETL run has somewhere to land.
  minio-init:
    image: minio/mc:RELEASE.2024-10-08T09-37-26Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/procurement-raw &&
      echo 'bucket procurement-raw ready'
      "

  airflow-db:
    image: postgres:16
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  # One-shot: migrate the metadata DB and create the admin user.
  airflow-init:
    <<: *airflow-common
    entrypoint: /bin/bash
    command:
      - -c
      - >
        airflow db migrate &&
        airflow users create --username admin --password admin
        --firstname Admin --lastname User --role Admin --email admin@example.com

  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    depends_on:
      airflow-db:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 15s
      timeout: 10s
      retries: 10

  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    depends_on:
      airflow-db:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully

  # BI over the dbt marts. Metabase keeps its own app state in an embedded H2
  # file on a named volume; it connects to the warehouse (Postgres marts) as a
  # data source. UI at http://localhost:3000.
  metabase:
    image: metabase/metabase:v0.51.6
    environment:
      MB_DB_TYPE: h2
      MB_DB_FILE: /metabase-data/metabase.db
    ports:
      - "3000:3000"
    volumes:
      - metabase_data:/metabase-data
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  airflow_db:
  miniodata:
  metabase_data:
